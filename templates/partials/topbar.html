<header class="ibsec-topbar">
  <div class="ibsec-topbar__left">
    <button class="ibsec-menu-button" type="button" data-sidebar-open aria-controls="ibsec-sidebar" aria-expanded="false" aria-label="Открыть меню"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
    {% if breadcrumbs %}
      <nav class="ibsec-breadcrumbs" aria-label="Навигационная цепочка"><ol>{% for crumb in breadcrumbs %}<li>{% if crumb.url and not forloop.last %}<a href="{{ crumb.url }}">{{ crumb.label }}</a><span aria-hidden="true">›</span>{% else %}<span aria-current="page">{{ crumb.label }}</span>{% endif %}</li>{% endfor %}</ol></nav>
    {% else %}<div class="ibsec-page-context">Корпоративное обучение по информационной безопасности</div>{% endif %}
  </div>
  <div class="ibsec-topbar__right">
    <div class="dropdown">
      <button class="ibsec-user-menu" type="button" data-bs-toggle="dropdown" aria-expanded="false">
        {% if request.user.profile.avatar %}<img class="ibsec-user-menu__avatar ibsec-user-menu__avatar--image" src="{{ request.user.profile.avatar.url }}" alt="Аватар пользователя">{% else %}<span class="ibsec-user-menu__avatar" aria-hidden="true">{{ request.user.first_name|default:request.user.username|slice:':1'|upper }}</span>{% endif %}
        <span class="ibsec-user-menu__text"><strong>{{ request.user.get_full_name|default:request.user.username }}</strong><small>{{ request.user.profile.get_role_display|default:'Пользователь' }}</small></span>
        <svg class="ibsec-user-menu__chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="m8 10 4 4 4-4"/></svg>
      </button>
      <ul class="dropdown-menu dropdown-menu-end ibsec-dropdown-menu"><li><a class="dropdown-item" href="{% url 'profile' %}">Личный кабинет</a></li><li><hr class="dropdown-divider"></li><li><a class="dropdown-item text-danger" href="{% url 'logout' %}">Выйти</a></li></ul>
    </div>
  </div>
</header>
