{% extends 'base.html' %}
{% block title %}Мой прогресс{% endblock %}
{% block content %}
<h3>Мой прогресс</h3>
<table class="table table-sm">
  <thead><tr><th>Тест</th><th>Баллы</th><th>Дата</th></tr></thead>
  <tbody>
    {% for s in submissions %}
      <tr>
        <td>{{ s.quiz.title }}</td>
        <td>{{ s.score }}%</td>
        <td>{{ s.taken_at|date:"d.m.Y H:i" }}</td>
      </tr>
    {% empty %}
      <tr><td colspan="3">Нет результатов.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
