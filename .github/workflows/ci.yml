name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "release/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  SECRET_KEY: ci-only-secret-key-not-for-production
  DEBUG: "False"
  ALLOWED_HOSTS: localhost,127.0.0.1

jobs:
  sqlite-tests:
    name: Django tests (SQLite)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DB_ENGINE: sqlite
      SQLITE_PATH: /tmp/ibsec_lms_ci.sqlite3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Run Django system checks
        run: python manage.py check

      - name: Check migration files
        run: python manage.py makemigrations --check --dry-run

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Verify migrations are applied
        run: python manage.py migrate --check

      - name: Collect static files
        run: python manage.py collectstatic --noinput --clear

      - name: Run tests
        run: python manage.py test --verbosity 2

  postgresql-tests:
    name: Django tests (PostgreSQL 18)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_DB: ibsec_lms_ci
          POSTGRES_USER: ibsec_ci
          POSTGRES_PASSWORD: ci-postgres-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -h 127.0.0.1 -U ibsec_ci -d ibsec_lms_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DB_ENGINE: postgresql
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      DB_NAME: ibsec_lms_ci
      DB_USER: ibsec_ci
      DB_PASSWORD: ci-postgres-password
      DB_CONN_MAX_AGE: "0"
      DB_CONN_HEALTH_CHECKS: "True"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Run Django system checks
        run: python manage.py check

      - name: Check migration files
        run: python manage.py makemigrations --check --dry-run

      - name: Apply migrations to PostgreSQL
        run: python manage.py migrate --noinput

      - name: Verify PostgreSQL migrations
        run: python manage.py migrate --check

      - name: Collect static files
        run: python manage.py collectstatic --noinput --clear

      - name: Run tests against PostgreSQL
        run: python manage.py test --verbosity 2

  docker-stack:
    name: Docker stack smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - sqlite-tests
      - postgresql-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Create CI Docker environment
        run: |
          cat > .env.docker.ci <<'EOF'
          SECRET_KEY=ci-docker-secret-key-not-for-production
          DEBUG=False
          ALLOWED_HOSTS=localhost,127.0.0.1
          CSRF_TRUSTED_ORIGINS=http://localhost:8000,http://127.0.0.1:8000
          POSTGRES_DB=ibsec_lms
          POSTGRES_USER=ibsec_user
          POSTGRES_PASSWORD=ci-docker-postgres-password
          POSTGRES_HOST_PORT=55432
          DB_CONN_MAX_AGE=0
          RUN_MIGRATIONS=True
          COLLECT_STATIC=True
          GUNICORN_WORKERS=2
          GUNICORN_THREADS=2
          GUNICORN_TIMEOUT=60
          GUNICORN_LOG_LEVEL=info
          DOCUMENT_ORGANIZATION_NAME=IBSec LMS
          DOCUMENT_SIGNER_TITLE=Ответственный за информационную безопасность
          DOCUMENT_SIGNER_NAME=
          EOF

      - name: Validate Docker Compose configuration
        run: docker compose --env-file .env.docker.ci config --quiet

      - name: Build and start Docker stack
        run: docker compose --env-file .env.docker.ci up -d --build

      - name: Wait for application health
        run: |
          for attempt in $(seq 1 36); do
            if curl --fail --silent --show-error http://127.0.0.1:8000/health/; then
              echo
              echo "IBSec LMS Docker stack is healthy."
              exit 0
            fi
            echo "Waiting for Docker stack... attempt ${attempt}/36"
            sleep 5
          done

          echo "Docker stack did not become healthy in time."
          docker compose --env-file .env.docker.ci ps
          docker compose --env-file .env.docker.ci logs --no-color
          exit 1

      - name: Show Docker service state
        run: docker compose --env-file .env.docker.ci ps

      - name: Stop Docker stack
        if: always()
        run: docker compose --env-file .env.docker.ci down --volumes --remove-orphans
